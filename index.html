<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CDK Tizimi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#07070f;color:#e0e0f0;min-height:100vh}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:300px;background:linear-gradient(180deg,rgba(99,102,241,.07),transparent);pointer-events:none;z-index:0}

/* LOGIN */
#loginPage{position:fixed;inset:0;background:#07070f;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:linear-gradient(160deg,#0d0d1f,#0a0a18);border:1px solid rgba(99,102,241,.2);border-radius:24px;padding:40px 32px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:44px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:900;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{font-size:13px;color:#444;margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#e0e0f0;font-size:16px;outline:none;text-align:center;letter-spacing:3px;font-family:'Inter',sans-serif;transition:border .2s;margin-bottom:14px}
.login-input:focus{border-color:rgba(99,102,241,.5)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.login-btn:active{opacity:.85}
.login-err{font-size:12px;color:#e94560;margin-top:10px;min-height:16px}

/* MAIN */
#mainPage{display:none;position:relative;z-index:1}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.header{text-align:center;margin-bottom:32px;padding-top:8px}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:30px;padding:6px 16px;margin-bottom:14px}
.header-badge span{font-size:12px;font-weight:700;color:#818cf8;letter-spacing:.5px;text-transform:uppercase}
.header h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,#fff 30%,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.header p{font-size:12px;color:#333}

.spinner-wrap{text-align:center;padding:60px;color:#333;font-size:13px}
.spinner{width:30px;height:30px;border:3px solid rgba(99,102,241,.15);border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

#app{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:720px){#app{grid-template-columns:1fr}}

/* PLAN CARD */
.plan-card{background:linear-gradient(160deg,#0d0d1f,#0a0a18);border-radius:20px;overflow:hidden}
.plan-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 14px;flex-wrap:wrap;gap:8px}
.plan-left{display:flex;align-items:center;gap:11px}
.plan-emoji-wrap{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.plan-name{font-size:13px;font-weight:800;color:#fff;margin-bottom:2px}
.plan-sub{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.plan-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.plan-count-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.btn-add-plan{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-add-plan:active{transform:scale(.95)}

/* CDK LIST */
.cdk-list{padding:0 12px 14px;display:flex;flex-direction:column;gap:5px}
.cdk-empty{text-align:center;padding:14px;font-size:12px;color:#2a2a3a;border:1px dashed rgba(255,255,255,.04);border-radius:10px}

.cdk-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:9px 11px}
.cdk-code{
  font-family:'Courier New',monospace;
  font-size:13px;font-weight:700;color:#d0d0e8;
  letter-spacing:1px;flex:1;
  /* MUHIM: to'liq ko'rinsin, qisqarmasin */
  word-break:break-all;
  white-space:normal;
  line-height:1.4
}
.cdk-btns{display:flex;gap:5px;flex-shrink:0;align-items:center}
.btn-copy{
  display:flex;align-items:center;gap:4px;
  padding:6px 10px;border-radius:7px;border:none;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;
  white-space:nowrap;flex-shrink:0
}
.btn-copy:active{transform:scale(.93)}
.btn-copy.copied{background:rgba(46,204,113,.1)!important;color:#2ecc71!important;border-color:rgba(46,204,113,.2)!important}
.btn-del{
  width:28px;height:28px;border-radius:7px;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;transition:all .2s;
  flex-shrink:0;background:rgba(239,68,68,.07);color:#f87171
}
.btn-del:active{transform:scale(.9)}
.btn-del:hover{background:rgba(239,68,68,.15)}

/* ADD FORM */
.add-form{display:none;margin:0 12px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;gap:10px;flex-direction:column}
.add-form.show{display:flex}
.add-form textarea{width:100%;padding:10px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:10px;color:#e0e0f0;font-size:13px;outline:none;font-family:'Courier New',monospace;letter-spacing:1px;line-height:1.7;resize:none;transition:border .2s}
.add-form textarea::placeholder{font-family:'Inter',sans-serif;letter-spacing:0;color:#2a2a3a;font-size:12px}
.form-btns{display:flex;gap:7px}
.btn-save{flex:1;padding:10px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.btn-save:active{opacity:.85}
.btn-cancel-form{padding:10px 14px;background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:10px;color:#444;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}

/* COLORS */
.card-plus{border:1px solid rgba(59,130,246,.15)}
.card-plus .plan-emoji-wrap{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(99,102,241,.1))}
.card-plus .plan-sub{color:#60a5fa}
.card-plus .plan-count-badge{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.card-plus .btn-add-plan{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.card-plus .btn-copy{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.15)}
.card-plus .add-form textarea:focus{border-color:rgba(59,130,246,.4)}
.card-plus .btn-save{background:linear-gradient(135deg,#3b82f6,#6366f1)}

.card-ygo{border:1px solid rgba(234,179,8,.15)}
.card-ygo .plan-emoji-wrap{background:linear-gradient(135deg,rgba(234,179,8,.2),rgba(249,115,22,.1))}
.card-ygo .plan-sub{color:#fbbf24}
.card-ygo .plan-count-badge{background:rgba(234,179,8,.12);color:#fbbf24;border:1px solid rgba(234,179,8,.2)}
.card-ygo .btn-add-plan{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.2)}
.card-ygo .btn-copy{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.15)}
.card-ygo .add-form textarea:focus{border-color:rgba(234,179,8,.4)}
.card-ygo .btn-save{background:linear-gradient(135deg,#d97706,#f59e0b)}

.card-yplus{border:1px solid rgba(249,115,22,.15)}
.card-yplus .plan-emoji-wrap{background:linear-gradient(135deg,rgba(249,115,22,.2),rgba(239,68,68,.1))}
.card-yplus .plan-sub{color:#fb923c}
.card-yplus .plan-count-badge{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
.card-yplus .btn-add-plan{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
.card-yplus .btn-copy{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.15)}
.card-yplus .add-form textarea:focus{border-color:rgba(249,115,22,.4)}
.card-yplus .btn-save{background:linear-gradient(135deg,#f97316,#ef4444)}

/* CONFIRM */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:16px}
.ov.show{display:flex}
.cbox{background:linear-gradient(160deg,#0d0d1f,#0a0a18);border:1px solid rgba(239,68,68,.2);border-radius:20px;padding:28px 22px;width:100%;max-width:300px;text-align:center;animation:pop .25s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.cbox-icon{font-size:36px;margin-bottom:10px}
.cbox-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:8px}
.cbox-code{font-family:'Courier New',monospace;font-size:12px;color:#f87171;font-weight:700;letter-spacing:1px;margin-bottom:18px;padding:8px;background:rgba(239,68,68,.06);border-radius:8px;word-break:break-all;line-height:1.5}
.cbox-btns{display:flex;gap:8px}
.cbtn-yes{flex:1;padding:11px;background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.cbtn-no{flex:1;padding:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#666;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#111128;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(46,204,113,.3);color:#2ecc71}
.toast.er{border-color:rgba(239,68,68,.3);color:#f87171}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🔑</div>
    <div class="login-title">CDK Tizimi</div>
    <div class="login-sub">Kirish uchun parol kiriting</div>
    <input type="password" class="login-input" id="loginInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Kirish →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainPage">
  <div class="wrap">
    <div class="header">
      <div class="header-badge">🔑 <span>CDK Tizimi</span></div>
      <h1>Kodlar bazasi</h1>
      <p>Real-time sinxronlangan</p>
    </div>
    <div id="app">
      <div class="spinner-wrap"><div class="spinner"></div>Yuklanmoqda...</div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="ov" id="confirmOv">
  <div class="cbox">
    <div class="cbox-icon">🗑️</div>
    <div class="cbox-title">O'chirasizmi?</div>
    <div class="cbox-code" id="confirmCode"></div>
    <div class="cbox-btns">
      <button class="cbtn-yes" onclick="confirmDelete()">Ha, o'chirish</button>
      <button class="cbtn-no" onclick="closeConfirm()">Bekor</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const PASS = "1234";

const app = initializeApp({ databaseURL: "https://cdk-tizimi-default-rtdb.firebaseio.com" });
const db  = getDatabase(app);

const PLANS = [
  {key:'plus',  name:'1 Oylik Plus',  sub:'Oylik · Plus',  icon:'⭐', cls:'card-plus'},
  {key:'ygo',   name:'1 Yillik Go',   sub:'Yillik · Go',   icon:'🌟', cls:'card-ygo'},
  {key:'yplus', name:'1 Yillik Plus', sub:'Yillik · Plus', icon:'🏆', cls:'card-yplus'},
];

var openForm   = null;
var pendingId  = null;
var pendingKey = null;
var allData    = {plus:{}, ygo:{}, yplus:{}};
var loaded     = {plus:false, ygo:false, yplus:false};

window.doLogin = function() {
  var val = document.getElementById('loginInput').value;
  if (val === PASS) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display  = 'block';
    startListening();
  } else {
    document.getElementById('loginErr').textContent = '❌ Parol noto\'g\'ri!';
    document.getElementById('loginInput').value = '';
    setTimeout(function(){ document.getElementById('loginErr').textContent=''; }, 2000);
  }
};

function startListening() {
  PLANS.forEach(function(p) {
    onValue(ref(db, 'cdks/' + p.key), function(snap) {
      allData[p.key] = snap.val() || {};
      loaded[p.key]  = true;
      if (loaded.plus && loaded.ygo && loaded.yplus) renderAll();
    });
  });
}

function renderAll() {
  var html = '';
  PLANS.forEach(function(p){ html += renderCard(p); });
  document.getElementById('app').innerHTML = html;
}

function renderCard(p) {
  var items  = allData[p.key];
  var keys   = Object.keys(items);
  var isOpen = openForm === p.key;

  var listHTML = '';
  if (keys.length === 0) {
    listHTML = '<div class="cdk-empty">Hozircha CDK yo\'q</div>';
  } else {
    keys.forEach(function(k) {
      var code = items[k].code;
      var safeCode = code.replace(/'/g, "\\'");
      listHTML +=
        '<div class="cdk-item">'
        + '<span class="cdk-code">'+code+'</span>'
        + '<div class="cdk-btns">'
        + '<button class="btn-copy" onclick="copyCode(\''+safeCode+'\',this)">📋</button>'
        + '<button class="btn-del" onclick="askDel(\''+k+'\',\''+p.key+'\',\''+safeCode+'\')">🗑</button>'
        + '</div></div>';
    });
  }

  var formHTML =
    '<div class="add-form'+(isOpen?' show':'')+'">'
    +'<textarea id="inp-'+p.key+'" rows="5" placeholder="Har qatorga 1 ta CDK:\nXXXX-XXXX-XXXX\nXXXX-XXXX-XXXX"></textarea>'
    +'<div class="form-btns">'
    +'<button class="btn-save" onclick="saveCDK(\''+p.key+'\')">✅ Saqlash</button>'
    +'<button class="btn-cancel-form" onclick="closeFormF()">✕</button>'
    +'</div></div>';

  return '<div class="plan-card '+p.cls+'">'
    +'<div class="plan-header">'
    +'<div class="plan-left">'
    +'<div class="plan-emoji-wrap">'+p.icon+'</div>'
    +'<div><div class="plan-name">'+p.name+'</div><div class="plan-sub">'+p.sub+'</div></div>'
    +'</div>'
    +'<div class="plan-right">'
    +'<span class="plan-count-badge">'+keys.length+' ta</span>'
    +'<button class="btn-add-plan" onclick="openFormF(\''+p.key+'\')">➕ Qo\'shish</button>'
    +'</div></div>'
    +'<div class="cdk-list">'+listHTML+'</div>'
    + formHTML
    +'</div>';
}

window.openFormF = function(key) {
  openForm = key; renderAll();
  var el = document.getElementById('inp-'+key);
  if (el) el.focus();
};

window.closeFormF = function() {
  openForm = null; renderAll();
};

window.saveCDK = function(key) {
  var el  = document.getElementById('inp-'+key);
  var raw = el ? el.value.trim() : '';
  if (!raw) { showToast('❌ CDK kiriting!','er'); return; }
  var lines = raw.split('\n').map(function(l){return l.trim().toUpperCase();}).filter(function(l){return l.length>0;});
  var added = 0, skip = 0;
  lines.forEach(function(code) {
    var exists = Object.values(allData[key]).find(function(v){return v.code===code;});
    if (exists) { skip++; return; }
    push(ref(db,'cdks/'+key), {code:code});
    added++;
  });
  openForm = null;
  if (added>0&&skip===0) showToast('✅ '+added+' ta CDK qo\'shildi!','ok');
  else if (added>0) showToast('✅ '+added+' ta qo\'shildi, '+skip+' ta takror','ok');
  else showToast('❌ Barchasi allaqachon bor!','er');
};

window.askDel = function(fbKey, planKey, code) {
  pendingId=fbKey; pendingKey=planKey;
  document.getElementById('confirmCode').textContent = code;
  document.getElementById('confirmOv').classList.add('show');
};

window.confirmDelete = function() {
  if (!pendingId) return;
  remove(ref(db,'cdks/'+pendingKey+'/'+pendingId));
  closeConfirm();
  showToast('🗑 O\'chirildi','ok');
};

window.closeConfirm = function() {
  pendingId=null; pendingKey=null;
  document.getElementById('confirmOv').classList.remove('show');
};

window.copyCode = function(code, btn) {
  var done = function(){
    btn.textContent='✅';
    btn.classList.add('copied');
    showToast('✅ Nusxalandi: '+code,'ok');
    setTimeout(function(){btn.textContent='📋';btn.classList.remove('copied');},2000);
  };
  if (navigator.clipboard&&navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(done).catch(function(){fallback(code);done();});
  } else { fallback(code); done(); }
};

function fallback(txt) {
  var t=document.createElement('textarea');
  t.value=txt; t.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(t); t.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(t);
}

function showToast(msg,type) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||'ok')+' show';
  setTimeout(function(){t.classList.remove('show');},2800);
}
</script>
</body>
</html>
