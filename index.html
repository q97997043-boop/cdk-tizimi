<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDK Tizimi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#07070f;color:#e0e0f0;min-height:100vh}

#loginPage{position:fixed;inset:0;background:#07070f;z-index:1000;display:flex;align-items:center;justify-content:center}
.lbox{background:#0d0d1f;border:1px solid #333;border-radius:20px;padding:36px 28px;width:320px;text-align:center}
.lbox h2{font-size:20px;color:#fff;margin-bottom:6px}
.lbox p{font-size:12px;color:#444;margin-bottom:24px}
.lbox input{width:100%;padding:12px;background:#111;border:1px solid #222;border-radius:10px;color:#fff;font-size:16px;text-align:center;letter-spacing:4px;outline:none;margin-bottom:12px}
.lbox button{width:100%;padding:12px;background:#6366f1;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.lerr{font-size:12px;color:#f87171;margin-top:8px;min-height:16px}

#mainPage{display:none}
.wrap{max-width:1300px;margin:0 auto;padding:20px 12px 60px}
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
.header p{font-size:11px;color:#333}

#app{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:1000px){#app{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){#app{grid-template-columns:1fr}}

.card{border-radius:16px;background:#0d0d1f;overflow:hidden;border:1px solid #1a1a2e}
.card-head{padding:14px;display:flex;align-items:center;justify-content:space-between}
.card-left{display:flex;align-items:center;gap:10px}
.icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.cname{font-size:13px;font-weight:800;color:#fff}
.csub{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.badge{font-size:11px;font-weight:800;padding:2px 10px;border-radius:20px}
.addbtn{font-size:10px;font-weight:700;padding:5px 10px;border-radius:7px;border:none;cursor:pointer;font-family:sans-serif}

.list{padding:0 10px 12px;display:flex;flex-direction:column;gap:5px}
.empty{text-align:center;padding:14px;font-size:11px;color:#222;border:1px dashed #1a1a2e;border-radius:8px}

.citem{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:8px 10px}
.ctop{display:flex;align-items:center;gap:6px}
.ccode{font-family:monospace;font-size:12px;font-weight:700;color:#ccc;flex:1;word-break:break-all;line-height:1.5}
.cbtns{display:flex;gap:4px;flex-shrink:0}
.cpbtn,.cdbtn{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.cdate{font-size:9px;color:#2a2a3a;margin-top:4px}

.addform{display:none;margin:0 10px 12px;background:rgba(255,255,255,.02);border:1px solid #1a1a2e;border-radius:10px;padding:10px;flex-direction:column;gap:8px}
.addform.open{display:flex}
.addform textarea{background:#0a0a15;border:1px solid #1a1a2e;border-radius:8px;color:#e0e0f0;font-size:12px;padding:8px;font-family:monospace;resize:none;outline:none}
.fbtns{display:flex;gap:6px}
.savebtn{flex:1;padding:9px;border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:sans-serif}
.cancelbtn{padding:9px 12px;background:transparent;border:1px solid #1a1a2e;border-radius:8px;color:#444;font-size:12px;cursor:pointer;font-family:sans-serif}

/* plan colors */
.go .icon{background:rgba(46,204,113,.15)} .go .csub{color:#2ecc71} .go .badge{background:rgba(46,204,113,.1);color:#2ecc71;border:1px solid rgba(46,204,113,.2)} .go .addbtn{background:rgba(46,204,113,.1);color:#2ecc71} .go .cpbtn{background:rgba(46,204,113,.1);color:#2ecc71} .go .savebtn{background:#2ecc71}
.plus .icon{background:rgba(59,130,246,.15)} .plus .csub{color:#60a5fa} .plus .badge{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)} .plus .addbtn{background:rgba(59,130,246,.1);color:#60a5fa} .plus .cpbtn{background:rgba(59,130,246,.1);color:#60a5fa} .plus .savebtn{background:#3b82f6}
.gift .icon{background:rgba(236,72,153,.15)} .gift .csub{color:#f472b6} .gift .badge{background:rgba(236,72,153,.1);color:#f472b6;border:1px solid rgba(236,72,153,.2)} .gift .addbtn{background:rgba(236,72,153,.1);color:#f472b6} .gift .cpbtn{background:rgba(236,72,153,.1);color:#f472b6} .gift .savebtn{background:#ec4899}
.ygo .icon{background:rgba(234,179,8,.15)} .ygo .csub{color:#fbbf24} .ygo .badge{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.2)} .ygo .addbtn{background:rgba(234,179,8,.1);color:#fbbf24} .ygo .cpbtn{background:rgba(234,179,8,.1);color:#fbbf24} .ygo .savebtn{background:#d97706}
.yplus .icon{background:rgba(249,115,22,.15)} .yplus .csub{color:#fb923c} .yplus .badge{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.2)} .yplus .addbtn{background:rgba(249,115,22,.1);color:#fb923c} .yplus .cpbtn{background:rgba(249,115,22,.1);color:#fb923c} .yplus .savebtn{background:#f97316}
.cdbtn{background:rgba(239,68,68,.08);color:#f87171}

.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:900;align-items:center;justify-content:center;padding:16px}
.ov.show{display:flex}
.cbox{background:#0d0d1f;border:1px solid rgba(239,68,68,.2);border-radius:18px;padding:26px 20px;width:280px;text-align:center}
.cbox h3{font-size:15px;color:#fff;margin-bottom:8px}
.cbox p{font-family:monospace;font-size:11px;color:#f87171;background:rgba(239,68,68,.06);padding:8px;border-radius:7px;margin-bottom:16px;word-break:break-all;line-height:1.5}
.cbox-btns{display:flex;gap:7px}
.cbox-btns button:first-child{flex:1;padding:10px;background:#e74c3c;border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.cbox-btns button:last-child{flex:1;padding:10px;background:rgba(255,255,255,.05);border:1px solid #222;border-radius:9px;color:#555;font-size:13px;cursor:pointer}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#111;border:1px solid #222;border-radius:10px;padding:10px 18px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(46,204,113,.3);color:#2ecc71}
.toast.er{border-color:rgba(239,68,68,.3);color:#f87171}
</style>
</head>
<body>

<div id="loginPage">
  <div class="lbox">
    <div style="font-size:40px;margin-bottom:12px">🔑</div>
    <h2>CDK Tizimi</h2>
    <p>Kirish uchun parol kiriting</p>
    <input type="password" id="pinput" placeholder="••••••" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Kirish →</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="mainPage">
  <div class="wrap">
    <div class="header">
      <h1>🔑 CDK Tizimi</h1>
      <p>Real-time sinxronlangan • Firebase</p>
    </div>
    <div id="app"><div style="text-align:center;padding:60px;color:#333">Yuklanmoqda...</div></div>
  </div>
</div>

<div class="ov" id="ov">
  <div class="cbox">
    <div style="font-size:32px;margin-bottom:10px">🗑️</div>
    <h3>O'chirasizmi?</h3>
    <p id="delcode"></p>
    <div class="cbox-btns">
      <button onclick="doDelete()">Ha, o'chirish</button>
      <button onclick="closeOv()">Bekor</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const PASS = "1234";
const db = getDatabase(initializeApp({ databaseURL: "https://cdk-tizimi-default-rtdb.firebaseio.com" }));

const PLANS = [
  {key:'go',    name:'1 Oylik Go',    sub:'OYLIK · GO',    icon:'🚀', cls:'go'},
  {key:'plus',  name:'1 Oylik Plus',  sub:'OYLIK · PLUS',  icon:'⭐', cls:'plus'},
  {key:'gift',  name:'1 Oylik Gift',  sub:'OYLIK · GIFT',  icon:'🎁', cls:'gift'},
  {key:'ygo',   name:'1 Yillik Go',   sub:'YILLIK · GO',   icon:'🌟', cls:'ygo'},
  {key:'yplus', name:'1 Yillik Plus', sub:'YILLIK · PLUS', icon:'🏆', cls:'yplus'},
];

var data = {go:{}, plus:{}, gift:{}, ygo:{}, yplus:{}};
var ready = {go:false, plus:false, gift:false, ygo:false, yplus:false};
var openForm = null;
var delId = null, delKey = null;

window.login = function(){
  var v = document.getElementById('pinput').value;
  if(v === PASS){
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    startSync();
  } else {
    document.getElementById('lerr').textContent = '❌ Parol noto\'g\'ri!';
    document.getElementById('pinput').value = '';
    setTimeout(function(){ document.getElementById('lerr').textContent=''; }, 2000);
  }
};

function startSync(){
  PLANS.forEach(function(p){
    onValue(ref(db,'cdks/'+p.key), function(snap){
      data[p.key] = snap.val() || {};
      ready[p.key] = true;
      if(PLANS.every(function(x){ return ready[x.key]; })) render();
    });
  });
}

function fmtDate(ts){
  if(!ts) return '';
  var d=new Date(ts);
  return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+d.getFullYear()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
}

function render(){
  document.getElementById('app').innerHTML = PLANS.map(function(p){ return cardHTML(p); }).join('');
}

function cardHTML(p){
  var items = data[p.key];
  var keys = Object.keys(items);
  var isOpen = openForm === p.key;

  var list = keys.length === 0
    ? '<div class="empty">CDK yo\'q</div>'
    : keys.map(function(k){
        var code = items[k].code;
        var date = fmtDate(items[k].addedAt);
        var sc = code.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        return '<div class="citem">'
          +'<div class="ctop">'
          +'<span class="ccode">'+code+'</span>'
          +'<div class="cbtns">'
          +'<button class="cpbtn" onclick="cp(\''+sc+'\',this)">📋</button>'
          +'<button class="cdbtn" onclick="askDel(\''+k+'\',\''+p.key+'\',\''+sc+'\')">🗑</button>'
          +'</div></div>'
          +(date?'<div class="cdate">📅 '+date+'</div>':'')
          +'</div>';
      }).join('');

  var form = '<div class="addform'+(isOpen?' open':'')+'">'
    +'<textarea id="ta-'+p.key+'" rows="5" placeholder="Har qatorga 1 ta CDK"></textarea>'
    +'<div class="fbtns">'
    +'<button class="savebtn" onclick="save(\''+p.key+'\')">✅ Saqlash</button>'
    +'<button class="cancelbtn" onclick="closeForm()">✕</button>'
    +'</div></div>';

  return '<div class="card '+p.cls+'">'
    +'<div class="card-head">'
    +'<div class="card-left"><div class="icon">'+p.icon+'</div>'
    +'<div><div class="cname">'+p.name+'</div><div class="csub">'+p.sub+'</div></div></div>'
    +'<div class="card-right">'
    +'<span class="badge">'+keys.length+' ta</span>'
    +'<button class="addbtn" onclick="openF(\''+p.key+'\')">➕ Qo\'sh</button>'
    +'</div></div>'
    +'<div class="list">'+list+'</div>'
    +form+'</div>';
}

window.openF = function(key){ openForm=key; render(); var el=document.getElementById('ta-'+key); if(el)el.focus(); };
window.closeForm = function(){ openForm=null; render(); };

window.save = function(key){
  var el=document.getElementById('ta-'+key);
  var raw=el?el.value.trim():'';
  if(!raw){ toast('❌ CDK kiriting!','er'); return; }
  var lines=raw.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
  var added=0, skip=0;
  lines.forEach(function(code){
    var ex=Object.values(data[key]).find(function(v){return v.code===code;});
    if(ex){skip++;return;}
    push(ref(db,'cdks/'+key),{code:code,addedAt:Date.now()});
    added++;
  });
  openForm=null;
  if(added>0&&skip===0) toast('✅ '+added+' ta qo\'shildi!','ok');
  else if(added>0) toast('✅ '+added+' ta qo\'shildi, '+skip+' takror','ok');
  else toast('❌ Barchasi allaqachon bor!','er');
};

window.askDel = function(id,key,code){
  delId=id; delKey=key;
  document.getElementById('delcode').textContent=code;
  document.getElementById('ov').classList.add('show');
};
window.doDelete = function(){
  if(!delId)return;
  remove(ref(db,'cdks/'+delKey+'/'+delId));
  closeOv(); toast('🗑 O\'chirildi','ok');
};
window.closeOv = function(){
  delId=null; delKey=null;
  document.getElementById('ov').classList.remove('show');
};

window.cp = function(code,btn){
  var done=function(){btn.textContent='✅';setTimeout(function(){btn.textContent='📋';},2000);toast('✅ Nusxalandi!','ok');};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(done).catch(function(){fb(code);done();});
  } else {fb(code);done();}
};
function fb(t){var x=document.createElement('textarea');x.value=t;x.style.cssText='position:fixed;opacity:0';document.body.appendChild(x);x.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(x);}
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'ok')+' show';setTimeout(function(){t.classList.remove('show');},2500);}
</script>
</body>
</html>
