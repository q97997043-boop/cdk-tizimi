<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CDK Tizimi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#07070f;color:#e0e0f0;min-height:100vh}

/* BG */
body::before{content:'';position:fixed;top:0;left:0;right:0;height:300px;background:linear-gradient(180deg,rgba(99,102,241,.07),transparent);pointer-events:none;z-index:0}

.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}
#app{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:700px){#app{grid-template-columns:1fr}}

/* HEADER */
.header{text-align:center;margin-bottom:36px;padding-top:8px}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:30px;padding:6px 16px;margin-bottom:14px}
.header-badge span{font-size:12px;font-weight:700;color:#818cf8;letter-spacing:.5px;text-transform:uppercase}
.header h1{font-size:26px;font-weight:900;background:linear-gradient(135deg,#fff 30%,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{font-size:13px;color:#444;font-weight:500}

/* PLAN CARD */
.plan-card{
  background:linear-gradient(160deg,#0d0d1f,#0a0a18);
  border-radius:20px;
  overflow:hidden;
  transition:transform .2s
}
.plan-card:active{transform:scale(.99)}

.plan-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 18px 16px
}
.plan-left{display:flex;align-items:center;gap:13px}
.plan-emoji-wrap{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;position:relative
}
.plan-info{flex:1}
.plan-name{font-size:15px;font-weight:800;color:#fff;margin-bottom:3px}
.plan-sub{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.plan-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.plan-count-badge{
  font-size:12px;font-weight:800;
  padding:4px 12px;border-radius:20px;
  letter-spacing:.3px
}
.btn-add-plan{
  display:flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:8px;border:none;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;
  letter-spacing:.3px
}
.btn-add-plan:active{transform:scale(.95)}

/* CDK ITEMS */
.cdk-list{padding:0 12px 14px;display:flex;flex-direction:column;gap:6px}
.cdk-empty{text-align:center;padding:18px;font-size:12px;color:#2a2a3a;font-weight:500;border:1px dashed rgba(255,255,255,.04);border-radius:12px}

.cdk-item{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:11px;padding:10px 13px;
  transition:all .15s
}
.cdk-item:hover{background:rgba(255,255,255,.05)}
.cdk-code{
  font-family:'Courier New',monospace;
  font-size:13px;font-weight:700;
  color:#d0d0e8;letter-spacing:1.2px;
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.cdk-btns{display:flex;gap:5px;flex-shrink:0}
.btn-copy{
  display:flex;align-items:center;gap:4px;
  padding:6px 11px;border-radius:8px;border:none;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap
}
.btn-copy:active{transform:scale(.93)}
.btn-del{
  width:30px;height:30px;border-radius:8px;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;transition:all .2s;flex-shrink:0;
  background:rgba(239,68,68,.07);color:#f87171
}
.btn-del:active{transform:scale(.9)}
.btn-del:hover{background:rgba(239,68,68,.14)}

/* ADD FORM */
.add-form{
  display:none;margin:0 12px 14px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:12px;gap:10px;flex-direction:column
}
.add-form.show{display:flex}
.add-form textarea{
  width:100%;padding:10px 12px;
  background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;color:#e0e0f0;
  font-size:13px;outline:none;
  font-family:'Courier New',monospace;
  letter-spacing:1px;line-height:1.7;resize:none;
  transition:border .2s
}
.add-form textarea:focus{border-color:rgba(99,102,241,.4)}
.add-form textarea::placeholder{font-family:'Inter',sans-serif;letter-spacing:0;color:#2a2a3a;font-size:12px}
.form-btns{display:flex;gap:7px}
.btn-save{
  flex:1;padding:10px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  border:none;border-radius:10px;color:#fff;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s
}
.btn-save:active{opacity:.85}
.btn-cancel-form{
  padding:10px 14px;background:transparent;
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;color:#444;font-size:13px;
  cursor:pointer;font-family:'Inter',sans-serif
}
.btn-cancel-form:active{background:rgba(255,255,255,.05)}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0 16px
}
.divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.divider-txt{font-size:10px;font-weight:700;color:#222;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}

/* ---- PLUS plan ---- */
.card-plus{border:1px solid rgba(59,130,246,.15)}
.card-plus .plan-emoji-wrap{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(99,102,241,.1));box-shadow:0 0 20px rgba(59,130,246,.15)}
.card-plus .plan-sub{color:#60a5fa}
.card-plus .plan-count-badge{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.card-plus .btn-add-plan{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.card-plus .btn-add-plan:hover{background:rgba(59,130,246,.18)}
.card-plus .btn-copy{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.15)}
.card-plus .btn-copy.copied{background:rgba(46,204,113,.1);color:#2ecc71;border-color:rgba(46,204,113,.2)}
.card-plus .add-form textarea:focus{border-color:rgba(59,130,246,.4)}
.card-plus .btn-save{background:linear-gradient(135deg,#3b82f6,#6366f1)}

/* ---- YGO plan ---- */
.card-ygo{border:1px solid rgba(234,179,8,.15)}
.card-ygo .plan-emoji-wrap{background:linear-gradient(135deg,rgba(234,179,8,.2),rgba(249,115,22,.1));box-shadow:0 0 20px rgba(234,179,8,.15)}
.card-ygo .plan-sub{color:#fbbf24}
.card-ygo .plan-count-badge{background:rgba(234,179,8,.12);color:#fbbf24;border:1px solid rgba(234,179,8,.2)}
.card-ygo .btn-add-plan{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.2)}
.card-ygo .btn-add-plan:hover{background:rgba(234,179,8,.18)}
.card-ygo .btn-copy{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.15)}
.card-ygo .btn-copy.copied{background:rgba(46,204,113,.1);color:#2ecc71;border-color:rgba(46,204,113,.2)}
.card-ygo .add-form textarea:focus{border-color:rgba(234,179,8,.4)}
.card-ygo .btn-save{background:linear-gradient(135deg,#d97706,#f59e0b)}

/* ---- YPLUS plan ---- */
.card-yplus{border:1px solid rgba(249,115,22,.15)}
.card-yplus .plan-emoji-wrap{background:linear-gradient(135deg,rgba(249,115,22,.2),rgba(239,68,68,.1));box-shadow:0 0 20px rgba(249,115,22,.15)}
.card-yplus .plan-sub{color:#fb923c}
.card-yplus .plan-count-badge{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
.card-yplus .btn-add-plan{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.2)}
.card-yplus .btn-add-plan:hover{background:rgba(249,115,22,.18)}
.card-yplus .btn-copy{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.15)}
.card-yplus .btn-copy.copied{background:rgba(46,204,113,.1);color:#2ecc71;border-color:rgba(46,204,113,.2)}
.card-yplus .add-form textarea:focus{border-color:rgba(249,115,22,.4)}
.card-yplus .btn-save{background:linear-gradient(135deg,#f97316,#ef4444)}

/* CONFIRM MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:900;align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:16px}
.ov.show{display:flex}
.cbox{
  background:linear-gradient(160deg,#0d0d1f,#0a0a18);
  border:1px solid rgba(239,68,68,.2);
  border-radius:20px;padding:30px 22px;
  width:100%;max-width:300px;text-align:center;
  animation:pop .25s cubic-bezier(.2,.8,.2,1)
}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.cbox-icon{font-size:38px;margin-bottom:12px}
.cbox-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:8px}
.cbox-code{
  font-family:'Courier New',monospace;font-size:12px;
  color:#f87171;font-weight:700;letter-spacing:1px;
  margin-bottom:20px;padding:8px 10px;
  background:rgba(239,68,68,.06);border-radius:8px;
  word-break:break-all;line-height:1.5
}
.cbox-btns{display:flex;gap:8px}
.cbtn-yes{flex:1;padding:12px;background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;border-radius:11px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.cbtn-yes:active{opacity:.85}
.cbtn-no{flex:1;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:11px;color:#666;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.cbtn-no:active{background:rgba(255,255,255,.1)}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:#111128;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(46,204,113,.3);color:#2ecc71}
.toast.er{border-color:rgba(239,68,68,.3);color:#f87171}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-badge">🔑 <span>CDK Tizimi</span></div>
    <h1>Kodlar bazasi</h1>
    <p>Har bir plan uchun CDK kodlarini boshqaring</p>
  </div>

  <div id="app"></div>
</div>

<!-- CONFIRM -->
<div class="ov" id="confirmOv">
  <div class="cbox">
    <div class="cbox-icon">🗑️</div>
    <div class="cbox-title">O'chirasizmi?</div>
    <div class="cbox-code" id="confirmCode"></div>
    <div class="cbox-btns">
      <button class="cbtn-yes" onclick="confirmDelete()">Ha, o'chirish</button>
      <button class="cbtn-no" onclick="closeConfirm()">Bekor</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PLANS = [
  {key:'plus',  name:'1 Oylik Plus',  sub:'Oylik · Plus',  icon:'⭐', cls:'card-plus'},
  {key:'ygo',   name:'1 Yillik Go',   sub:'Yillik · Go',   icon:'🌟', cls:'card-ygo'},
  {key:'yplus', name:'1 Yillik Plus', sub:'Yillik · Plus', icon:'🏆', cls:'card-yplus'},
];

var db = {
  openForm: null,
  cdks: [
    {id:1,  plan:'plus',  code:'PLS-A1B2-C3D4'},
    {id:2,  plan:'plus',  code:'PLS-E5F6-G7H8'},
    {id:3,  plan:'plus',  code:'PLS-I9J0-K1L2'},
    {id:4,  plan:'ygo',   code:'YGO-M3N4-O5P6'},
    {id:5,  plan:'ygo',   code:'YGO-Q7R8-S9T0'},
    {id:6,  plan:'yplus', code:'YPL-U1V2-W3X4'},
  ]
};

var pendingId = null;

function render() {
  var html = '';
  PLANS.forEach(function(p, i) {
    html += renderCard(p);
  });
  document.getElementById('app').innerHTML = html;
}

function renderCard(p) {
  var items = db.cdks.filter(function(c){return c.plan===p.key;});
  var isOpen = db.openForm === p.key;

  var listHTML = '';
  if (items.length === 0) {
    listHTML = '<div class="cdk-empty">Hozircha CDK yo\'q</div>';
  } else {
    items.forEach(function(c){
      listHTML +=
        '<div class="cdk-item">'
        +'<span class="cdk-code">'+c.code+'</span>'
        +'<div class="cdk-btns">'
        +'<button class="btn-copy" onclick="copyCode(\''+c.code+'\',this)">📋 Nusxa</button>'
        +'<button class="btn-del" onclick="askDel('+c.id+')">🗑</button>'
        +'</div></div>';
    });
  }

  var formHTML =
    '<div class="add-form'+(isOpen?' show':'')+'">'
    +'<textarea id="inp-'+p.key+'" rows="4" placeholder="Har qatorga 1 ta CDK:\nXXXX-XXXX-XXXX\nXXXX-XXXX-XXXX"></textarea>'
    +'<div class="form-btns">'
    +'<button class="btn-save" onclick="saveCDK(\''+p.key+'\')">✅ Saqlash</button>'
    +'<button class="btn-cancel-form" onclick="closeForm()">✕ Bekor</button>'
    +'</div></div>';

  return '<div class="plan-card '+p.cls+'">'
    +'<div class="plan-header">'
    +'<div class="plan-left">'
    +'<div class="plan-emoji-wrap">'+p.icon+'</div>'
    +'<div class="plan-info">'
    +'<div class="plan-name">'+p.name+'</div>'
    +'<div class="plan-sub">'+p.sub+'</div>'
    +'</div></div>'
    +'<div class="plan-right">'
    +'<span class="plan-count-badge">'+items.length+' ta</span>'
    +'<button class="btn-add-plan" onclick="openForm(\''+p.key+'\')">➕ Qo\'shish</button>'
    +'</div></div>'
    +'<div class="cdk-list">'+listHTML+'</div>'
    + formHTML
    +'</div>';
}

function openForm(key) {
  db.openForm = key;
  render();
  var el = document.getElementById('inp-'+key);
  if (el) el.focus();
}

function closeForm() {
  db.openForm = null;
  render();
}

function saveCDK(key) {
  var el = document.getElementById('inp-'+key);
  var raw = el ? el.value.trim() : '';
  if (!raw) { showToast('❌ CDK kiriting!','er'); return; }
  var lines = raw.split('\n').map(function(l){return l.trim().toUpperCase();}).filter(function(l){return l.length>0;});
  var added=0, skip=0;
  lines.forEach(function(code){
    if (db.cdks.find(function(c){return c.code===code;})) {skip++;return;}
    db.cdks.push({id:Date.now()+Math.random(), plan:key, code:code});
    added++;
  });
  db.openForm = null;
  render();
  if (added>0&&skip===0) showToast('✅ '+added+' ta CDK qo\'shildi!','ok');
  else if (added>0) showToast('✅ '+added+' ta qo\'shildi, '+skip+' ta takror','ok');
  else showToast('❌ Barchasi allaqachon bor!','er');
}

function askDel(id) {
  var item = db.cdks.find(function(c){return c.id===id;});
  if (!item) return;
  pendingId = id;
  document.getElementById('confirmCode').textContent = item.code;
  document.getElementById('confirmOv').classList.add('show');
}

function confirmDelete() {
  if (pendingId===null) return;
  db.cdks = db.cdks.filter(function(c){return c.id!==pendingId;});
  pendingId = null;
  closeConfirm();
  render();
  showToast('🗑 O\'chirildi','ok');
}

function closeConfirm() {
  pendingId = null;
  document.getElementById('confirmOv').classList.remove('show');
}

function copyCode(code, btn) {
  var done = function(){
    var orig = btn.innerHTML;
    btn.textContent = '✅ Nusxalandi';
    btn.classList.add('copied');
    showToast('✅ Nusxalandi!','ok');
    setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('copied');},1800);
  };
  if (navigator.clipboard&&navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(done).catch(function(){fallback(code);done();});
  } else { fallback(code); done(); }
}

function fallback(txt) {
  var t=document.createElement('textarea');
  t.value=txt;t.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(t);t.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(t);
}

function showToast(msg,type) {
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'ok')+' show';
  setTimeout(function(){t.classList.remove('show');},2200);
}

render();
</script>
</body>
</html>
